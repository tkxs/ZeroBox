name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      source_ref:
        description: Source branch or tag to build
        required: true
        default: main
      release_tag:
        description: Existing Release tag to upload to; leave empty for an Actions artifact only
        required: false
        default: ""

permissions:
  contents: write

env:
  NODE_VERSION: 22.19.0
  ANDROID_NDK_VERSION: 27.2.12479018

jobs:
  android:
    name: Android arm64 APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: npm install -g pnpm@10.32.1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agent-gui/src-tauri

      - name: Install protobuf compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install frontend dependencies
        working-directory: crates/agent-gui
        run: pnpm install --frozen-lockfile

      - name: Install Gateway WebUI dependencies
        working-directory: crates/agent-gateway/web
        run: pnpm install --frozen-lockfile

      - name: Resolve Android version
        id: version
        shell: bash
        working-directory: crates/agent-gui
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_tag="$REQUESTED_RELEASE_TAG"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -z "${{ inputs.release_tag }}" ]; then
            release_tag=""
          fi
          build_tag="$release_tag"
          if [ -z "$build_tag" ]; then
            build_tag="v$(node -p "require('./package.json').version")"
          fi
          node ../../scripts/release/prepare-app-version-from-tag.mjs \
            "$build_tag" \
            --github-env "$GITHUB_ENV" \
            --tauri-config src-tauri/tauri.version.generated.conf.json
          echo "build_tag=$build_tag" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Initialize Android project
        working-directory: crates/agent-gui
        run: pnpm tauri android init --ci --skip-targets-install --config "$LIVEAGENT_TAURI_VERSION_CONFIG"

      - name: Install ZeroAgent Android launcher icons
        shell: bash
        run: |
          set -euo pipefail
          source_dir="crates/agent-gui/src-tauri/icons/android"
          target_dir="crates/agent-gui/src-tauri/gen/android/app/src/main/res"
          test -d "$source_dir"
          test -d "$target_dir"
          cp -R "$source_dir"/. "$target_dir"/
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            for icon in ic_launcher ic_launcher_foreground ic_launcher_round; do
              cmp "$source_dir/mipmap-${density}/${icon}.png" \
                "$target_dir/mipmap-${density}/${icon}.png"
            done
          done
          cmp "$source_dir/mipmap-anydpi-v26/ic_launcher.xml" \
            "$target_dir/mipmap-anydpi-v26/ic_launcher.xml"
          cmp "$source_dir/values/ic_launcher_background.xml" \
            "$target_dir/values/ic_launcher_background.xml"

      - name: Warm Gradle distribution
        shell: bash
        working-directory: crates/agent-gui/src-tauri/gen/android
        run: |
          set -euo pipefail
          wrapper_properties="gradle/wrapper/gradle-wrapper.properties"
          test -f "$wrapper_properties"
          if grep -q '^networkTimeout=' "$wrapper_properties"; then
            sed -i 's/^networkTimeout=.*/networkTimeout=120000/' "$wrapper_properties"
          else
            printf '\nnetworkTimeout=120000\n' >> "$wrapper_properties"
          fi
          for attempt in 1 2 3; do
            if ./gradlew --version --no-daemon; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Build Android release APK
        working-directory: crates/agent-gui
        run: pnpm tauri android build --apk --target aarch64 --ci --config "$LIVEAGENT_TAURI_VERSION_CONFIG"

      - name: Sign and verify Android APK
        id: package
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          unsigned_apk="$(find crates/agent-gui/src-tauri/gen/android -type f -name '*-release-unsigned.apk' -print -quit)"
          if [ -z "$unsigned_apk" ]; then
            unsigned_apk="$(find crates/agent-gui/src-tauri/gen/android -type f -name '*-release.apk' -print -quit)"
          fi
          test -n "$unsigned_apk"

          build_tools="${ANDROID_HOME}/build-tools/35.0.0"
          mkdir -p dist
          keystore="$RUNNER_TEMP/zeroagent-android.p12"
          aligned_apk="$RUNNER_TEMP/zeroagent-aligned.apk"
          output_apk="dist/ZeroAgent-${{ steps.version.outputs.build_tag }}-Android-arm64.apk"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          "$build_tools/zipalign" -p -f 4 "$unsigned_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:ANDROID_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$output_apk" \
            "$aligned_apk"
          "$build_tools/apksigner" verify --verbose --print-certs "$output_apk"
          echo "apk=$output_apk" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ZeroAgent-${{ steps.version.outputs.build_tag }}-Android-arm64
          path: ${{ steps.package.outputs.apk }}
          if-no-files-found: error

      - name: Upload APK to GitHub Release
        if: steps.version.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          APK_PATH: ${{ steps.package.outputs.apk }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release upload "$RELEASE_TAG" "$APK_PATH" --clobber
              exit 0
            fi
            sleep 20
          done
          echo "Release $RELEASE_TAG was not available after 20 minutes." >&2
          exit 1

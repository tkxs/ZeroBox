<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>ZeroAgent</title>
  </head>
  <body>
    <main class="mobile-shell">
      <img class="mobile-shell__logo" src="/zeroagent-logo.png" alt="ZeroAgent" />
      <h1>ZeroAgent</h1>
      <p id="status">Opening chat...</p>
      <form id="gateway-form" hidden>
        <label for="gateway-url">ZeroAgent WebUI URL</label>
        <input
          id="gateway-url"
          name="gateway-url"
          type="url"
          inputmode="url"
          autocomplete="url"
          autocapitalize="none"
          placeholder="https://gateway.example.com"
          required
        />
        <button type="submit">Open chat</button>
      </form>
    </main>
    <script type="module" src="/src/mobile.ts"></script>
  </body>
</html>

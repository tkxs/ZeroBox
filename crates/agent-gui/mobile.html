<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f5" />
    <link rel="icon" type="image/png" href="/zeroagent-logo.png" />
    <title>ZeroAgent</title>
  </head>
  <body>
    <div class="mobile-background" aria-hidden="true">
      <div class="mobile-background__grid"></div>
      <canvas class="mobile-background__code-flow" id="code-flow"></canvas>
    </div>
    <main class="mobile-shell">
      <section class="mobile-shell__intro" aria-labelledby="mobile-shell-title">
        <img class="mobile-shell__logo" src="/zeroagent-logo.png" alt="ZeroAgent" />
        <p class="mobile-shell__brand">ZeroAgent</p>
        <h1 id="mobile-shell-title">ZeroAgent</h1>
        <p class="mobile-shell__description">连接已部署的 ZeroAgent Gateway</p>
      </section>

      <form class="gateway-form" id="gateway-form" novalidate>
        <label for="gateway-url">Gateway 地址</label>
        <input
          id="gateway-url"
          name="gateway-url"
          type="url"
          inputmode="url"
          autocomplete="url"
          autocapitalize="none"
          spellcheck="false"
          placeholder="https://gateway.example.com"
          required
        />
        <p class="gateway-form__hint">支持 HTTPS；局域网或 USB 调试也可使用 HTTP 地址。</p>
        <p class="gateway-form__status" id="gateway-status" role="alert" aria-live="polite"></p>
        <button type="submit" id="gateway-submit">打开 WebUI</button>
      </form>
    </main>

    <script type="module" src="/src/mobile.ts"></script>
  </body>
</html>
